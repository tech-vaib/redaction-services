# deploy/k8s/ingress.yaml
---
# NGINX Ingress with TLS termination + rate limiting
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pii-redaction-ingress
  namespace: redaction
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting: 100 req/s per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Request size limit (1MB)
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # TLS cert via cert-manager (Let's Encrypt or internal CA)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - redaction.yourdomain.com
      secretName: redaction-tls
  rules:
    - host: redaction.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pii-redaction
                port:
                  number: 80

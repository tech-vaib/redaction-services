# deploy/k8s/service.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: redaction
  labels:
    app: pii-redaction

---
apiVersion: v1
kind: Service
metadata:
  name: pii-redaction
  namespace: redaction
  labels:
    app: pii-redaction
spec:
  selector:
    app: pii-redaction
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP

---
# Load balancer for external access (use Ingress in prod instead)
apiVersion: v1
kind: Service
metadata:
  name: pii-redaction-lb
  namespace: redaction
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"  # internal AKS LB
spec:
  selector:
    app: pii-redaction
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pii-redaction-hpa
  namespace: redaction
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pii-redaction
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # Scale up when avg CPU > 60%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60         # Add up to 4 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120

---
# Pod Disruption Budget — always keep 2 pods running during maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pii-redaction-pdb
  namespace: redaction
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: pii-redaction

---
# Network Policy — restrict inbound traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pii-redaction-netpol
  namespace: redaction
spec:
  podSelector:
    matchLabels:
      app: pii-redaction
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8000
  egress:
    - {}    # Allow all outbound (DNS, logging, etc.)

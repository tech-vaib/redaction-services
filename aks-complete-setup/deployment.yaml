# deploy/k8s/deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────
# AKS Production Deployment
# kubectl apply -f deploy/k8s/
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pii-redaction
  namespace: redaction
  labels:
    app: pii-redaction
    version: "2.0.0"
    component: api
spec:
  replicas: 3                        # Minimum 3 for HA; HPA scales 3–20
  selector:
    matchLabels:
      app: pii-redaction
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: pii-redaction
        version: "2.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"

    spec:
      # Anti-affinity: spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [pii-redaction]
                topologyKey: kubernetes.io/hostname

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: pii-redaction
          image: YOUR_ACR.azurecr.io/pii-redaction:2.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          env:
            - name: REDACT_ENVIRONMENT
              value: "production"
            - name: REDACT_LOG_JSON
              value: "true"
            - name: REDACT_LOG_LEVEL
              value: "INFO"
            - name: REDACT_SPACY_MODEL
              value: "en_core_web_lg"
            - name: REDACT_PIPELINE_WORKERS
              value: "8"
            - name: REDACT_PRESIDIO_SCORE_THRESHOLD
              value: "0.35"
            - name: REDACT_METRICS_ENABLED
              value: "true"
            - name: REDACT_RESULT_CACHE_ENABLED
              value: "true"
            - name: REDACT_RESULT_CACHE_TTL_SECONDS
              value: "300"
            - name: REDACT_AUDIT_STORE_TOKEN_MAP
              value: "false"

          # Resource limits — sized for en_core_web_lg
          resources:
            requests:
              cpu: "500m"
              memory: "1.5Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"

          # Probes
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24    # 24 × 5s = 2 min startup window

          # Security
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 500Mi

      # Grace period for in-flight requests
      terminationGracePeriodSeconds: 60

      # Image pull secret for private ACR
      imagePullSecrets:
        - name: acr-secret

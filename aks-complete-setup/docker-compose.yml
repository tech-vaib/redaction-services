# deploy/docker/docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Local development stack:
#   make dev          → starts everything
#   make dev-down     → tears down
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Main redaction service ────────────────────────────────────────────────
  redaction:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDACT_ENVIRONMENT: local
      REDACT_LOG_JSON: "false"
      REDACT_LOG_LEVEL: DEBUG
      REDACT_PIPELINE_WORKERS: "4"
      REDACT_SPACY_MODEL: en_core_web_lg
      REDACT_METRICS_ENABLED: "true"
      REDACT_RESULT_CACHE_ENABLED: "true"
      REDACT_PRESIDIO_SCORE_THRESHOLD: "0.35"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
